<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/htmx.org"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Profile</h1>

        <!-- Plan and collection creation -->
        <div class="flex gap-6 mb-10">
            <div class="bg-white rounded-xl shadow p-5 flex-1">
                <h2 class="text-lg font-semibold text-gray-700 mb-3">Create a new plan</h2>
                <form hx-post="/create-plan" hx-target="#plan-data" hx-swap="innerHTML" class="flex gap-2">
                    <input type="text" name="plan-name" placeholder="Plan Name" required
                           class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-300">
                    <button type="submit"
                            class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-600">Create</button>
                </form>
            </div>
            <div class="bg-white rounded-xl shadow p-5 flex-1">
                <h2 class="text-lg font-semibold text-gray-700 mb-3">Create a new collection</h2>
                <form hx-post="/create-collection" hx-target="#plan-data" hx-swap="innerHTML" class="flex gap-2">
                    <input type="text" name="collection-name" placeholder="Collection Name" required
                           class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                    <button type="submit"
                            class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-600">Create</button>
                </form>
            </div>
        </div>

        <!-- Plan data -->
        <div id="plan-data" hx-get="/user-data?id=1" hx-trigger="load" hx-swap="innerHTML"
             class="mb-10"></div>

        <!-- Week planner -->
        <section class="bg-white rounded-xl shadow p-6">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-semibold text-gray-700">Weekly Meal Planner</h2>
            <button hx-post="/generate-grocery-list">create grocery list</button>
          </div>
            <div class="grid grid-cols-7 gap-3">

                <!-- Monday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Mon</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=1&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=1&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=1&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Tuesday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Tue</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=2&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=2&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=2&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Wednesday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Wed</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=3&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=3&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=3&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Thursday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Thu</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=4&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=4&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=4&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Friday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Fri</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=5&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=5&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=5&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Saturday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Sat</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=6&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=6&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=6&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

                <!-- Sunday -->
                <div class="flex flex-col gap-2">
                    <h3 class="text-sm font-semibold text-gray-500 text-center">Sun</h3>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=7&meal=Breakfast" hx-trigger="load">Breakfast</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=7&meal=Lunch" hx-trigger="load">Lunch</div>
                    <div class="bg-gray-50 rounded-lg p-2 min-h-16 text-xs text-gray-400"
                         hx-get="/schedule?plan_id=1&day=7&meal=Dinner" hx-trigger="load">Dinner</div>
                </div>

            </div>
        </section>
    </div>
</body>
</html>
